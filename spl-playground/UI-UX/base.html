<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}SQLi Playground{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page-shell">
    <div class="background-anim">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
    </div>
    <header class="page-header">
      <div class="brand">
        <div class="brand-icon">SQLi</div>
        <div>
          <h1>SQLi Playground</h1>
          <p>Interactive learning with vulnerable SQL, detection, and defense.</p>
        </div>
      </div>
      <nav class="page-nav">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/search">Search</a>
        <a href="/products">Products</a>
        <a href="/profile">Profile</a>
        <a href="/admin-search">Admin Search</a>
        <a href="/challenges">Challenges</a>
      </nav>
    </header>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="{{ url_for('static', filename='floaters.js') }}"></script>
</body>
</html>
